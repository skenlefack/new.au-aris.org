# ═══════════════════════════════════════════════════════════════
# ARIS 4.0 — VM-KAFKA: 3 Kafka KRaft Brokers + Schema Registry
# Host: 10.202.101.184 (nbo-brk01)
# ═══════════════════════════════════════════════════════════════

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  restart: unless-stopped
  networks:
    - aris-kafka-network

services:

  kafka-1:
    <<: *kafka-common
    container_name: aris-kafka-1
    hostname: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:29092,EXTERNAL://10.202.101.184:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_JMX_PORT: 9997
      KAFKA_HEAP_OPTS: '-Xmx4g -Xms4g'
    volumes:
      - /kafka-data/broker-1:/var/lib/kafka/data

  kafka-2:
    <<: *kafka-common
    container_name: aris-kafka-2
    hostname: kafka-2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:29092,EXTERNAL://10.202.101.184:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_JMX_PORT: 9997
      KAFKA_HEAP_OPTS: '-Xmx4g -Xms4g'
    volumes:
      - /kafka-data/broker-2:/var/lib/kafka/data

  kafka-3:
    <<: *kafka-common
    container_name: aris-kafka-3
    hostname: kafka-3
    ports:
      - "9096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9096'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:29092,EXTERNAL://10.202.101.184:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_JMX_PORT: 9997
      KAFKA_HEAP_OPTS: '-Xmx4g -Xms4g'
    volumes:
      - /kafka-data/broker-3:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: aris-schema-registry
    hostname: schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka-1:29092,kafka-2:29092,kafka-3:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: 'BACKWARD'
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - aris-kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: aris-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: 'ARIS Production'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka-1:29092,kafka-2:29092,kafka-3:29092'
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: 'http://schema-registry:8081'
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - schema-registry
    networks:
      - aris-kafka-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aris-kafka-init
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - aris-kafka-network
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka-1:29092 1 120

      echo 'Creating ARIS Kafka topics...'
      BOOTSTRAP=kafka-1:29092

      # === System Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.tenant.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.tenant.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.credential.user.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.credential.user.authenticated.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.message.notification.sent.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.message.notification.failed.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.drive.file.uploaded.v1 --partitions 3 --replication-factor 3

      # === Master Data Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.geo.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.species.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.disease.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.denominator.updated.v1 --partitions 3 --replication-factor 3

      # === Quality Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.record.validated.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.record.rejected.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.correction.overdue.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.validation.requested.v1 --partitions 6 --replication-factor 3

      # === Collecte Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.campaign.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.form.submitted.v1 --partitions 12 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.form.synced.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.submission.quality-completed.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.submission.workflow-created.v1 --partitions 6 --replication-factor 3

      # === FormBuilder Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.formbuilder.template.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.formbuilder.template.published.v1 --partitions 3 --replication-factor 3

      # === Workflow Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.submitted.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.approved.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.rejected.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.escalated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.wahis.ready.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.analytics.ready.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.instance.requested.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.instance.created.v1 --partitions 6 --replication-factor 3

      # === Health Domain Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.event.created.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.event.updated.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.event.confirmed.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.lab.result.created.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.vaccination.completed.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.surveillance.reported.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic rec.health.outbreak.alert.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.entity.flags-updated.v1 --partitions 3 --replication-factor 3

      # === Interop Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.wahis.exported.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.empres.fed.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.faostat.synced.v1 --partitions 3 --replication-factor 3

      # === Support Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.support.ticket.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.support.ticket.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.support.ticket.closed.v1 --partitions 3 --replication-factor 3

      # === Interop V2 Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.dhis2.synced.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.fhir.synced.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.oms.synced.v1 --partitions 3 --replication-factor 3

      # === Offline Sync Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.offline.sync.pushed.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.offline.sync.conflict.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.offline.sync.resolved.v1 --partitions 3 --replication-factor 3

      # === DLQ Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.all.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.health.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.collecte.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.workflow.v1 --partitions 3 --replication-factor 3

      echo 'All ARIS topics created!'
      kafka-topics --list --bootstrap-server $$BOOTSTRAP
      "

networks:
  aris-kafka-network:
    driver: bridge
    name: aris-kafka-network

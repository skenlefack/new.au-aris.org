    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: interop-hub
        SERVICE_PORT: "3032"
    ports:
      - "3032:3032"
    environment:
      <<: *service-env
      SERVICE_PORT: "3032"
      KAFKA_CLIENT_ID: aris-interop-hub-service
    volumes: *service-volumes

      - "traefik.http.routers.master-data.rule=PathPrefix(`/api/v1/master-data`)"
      - "traefik.http.routers.master-data.entrypoints=web,websecure"
      - "traefik.http.services.master-data.loadbalancer.server.port=3003"

  data-quality:

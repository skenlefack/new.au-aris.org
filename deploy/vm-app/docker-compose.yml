# ═══════════════════════════════════════════════════════════════
# ARIS 4.0 — VM-APP: All Microservices + Traefik + Monitoring + BI
# Host: 10.202.101.183 (nbo-aris04)
# ═══════════════════════════════════════════════════════════════
# External dependencies (on other VMs):
#   PostgreSQL/PgBouncer → 10.202.101.185:6432/5432
#   Kafka               → 10.202.101.184:9092,9094,9096
#   Redis               → 10.202.101.186:6379
#   OpenSearch           → 10.202.101.186:9200
# ═══════════════════════════════════════════════════════════════

x-service-common: &service-common
  restart: unless-stopped
  networks:
    - aris-app-network

x-service-env: &service-env
  NODE_ENV: production
  LOG_LEVEL: info
  DATABASE_URL: postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-Ar1s_Pr0d_2024!xK9mZ}@10.202.101.185:6432/${POSTGRES_DB:-aris}?pgbouncer=true
  DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-Ar1s_Pr0d_2024!xK9mZ}@10.202.101.185:5432/${POSTGRES_DB:-aris}
  REDIS_URL: redis://:${REDIS_PASSWORD:-R3d1s_Pr0d_2024!vN7wQ}@10.202.101.186:6379
  KAFKA_BROKERS: 10.202.101.184:9092,10.202.101.184:9094,10.202.101.184:9096
  SCHEMA_REGISTRY_URL: http://10.202.101.184:8081
  OPENSEARCH_URL: http://10.202.101.186:9200
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aris_minio_prod}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-M1n10_Pr0d_2024!jH6pR}
  MINIO_BUCKET: aris-documents
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
  POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
  POSTMARK_FROM: ${POSTMARK_FROM:-noreply@au-aris.org}
  POSTMARK_MESSAGE_STREAM: ${POSTMARK_MESSAGE_STREAM:-outbound}
  POSTMARK_TAG: ${POSTMARK_TAG:-aris}
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_FROM: noreply@au-aris.org
  JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
  JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http
  OTEL_ENVIRONMENT: production
  OTEL_TRACES_SAMPLER_ARG: "0.1"

x-service-build: &service-build
  context: /opt/aris
  dockerfile: Dockerfile.service

x-service-volumes: &service-volumes
  - /opt/aris/keys:/app/keys:ro

services:

  # ═══════════════════════════════════════════════════
  #  TRAEFIK — API Gateway & Reverse Proxy
  # ═══════════════════════════════════════════════════
  traefik:
    image: traefik:latest
    container_name: aris-traefik
    <<: *service-common
    environment:
      DOCKER_API_VERSION: "1.45"
    ports:
      - "80:80"
      - "443:443"
      - "8090:8080"
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=aris-app-network"
      # ── Entrypoints ──
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # ── TLS file provider (GoDaddy wildcard *.au-aris.org) ──
      - "--providers.file.filename=/etc/traefik/tls.yml"
      - "--providers.file.watch=true"
      # ── Logging ──
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--ping=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/aris/deploy/vm-app/traefik/tls.yml:/etc/traefik/tls.yml:ro
      - /opt/aris-deploy/vm-app/certs:/etc/traefik/certs:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════
  #  MINIO — S3-compatible Object Storage
  # ═══════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: aris-minio
    <<: *service-common
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aris_minio_prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-M1n10_Pr0d_2024!jH6pR}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════
  #  MAILPIT — Email (production: replace with real SMTP relay)
  # ═══════════════════════════════════════════════════
  mailpit:
    image: axllent/mailpit:v1.18
    container_name: aris-mailpit
    <<: *service-common
    ports:
      - "1025:1025"
      - "8025:8025"

  # ═══════════════════════════════════════════════════
  #  MONITORING — Prometheus + Grafana + Jaeger
  # ═══════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: aris-prometheus
    <<: *service-common
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - /opt/aris-deploy/vm-app/prometheus-production.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/aris/infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.2
    container_name: aris-grafana
    <<: *service-common
    ports:
      - "3200:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-Gr4f4na_Pr0d_2024!aS7dF}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_HEADER_PROPERTY: "email"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Name:X-WEBAUTH-NAME Role:X-WEBAUTH-ROLE"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: "https://au-aris.org:3200"
    volumes:
      - /opt/aris/infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /opt/aris-deploy/vm-app/grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - /opt/aris/infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aris-jaeger
    <<: *service-common
    user: "0"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "badger"
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: "/badger/data"
      BADGER_DIRECTORY_KEY: "/badger/key"
    volumes:
      - jaeger-data:/badger

  # ═══════════════════════════════════════════════════
  #  BI TOOLS — Superset + Metabase
  # ═══════════════════════════════════════════════════
  superset:
    image: apache/superset:3.1.3
    container_name: aris-superset
    <<: *service-common
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-Sup3rs3t_Pr0d_S3cr3t_2024!mW8nX}
      TALISMAN_ENABLED: "false"
      ENABLE_CORS: "true"
      SQLALCHEMY_DATABASE_URI: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-Ar1s_Pr0d_2024!xK9mZ}@10.202.101.185:5432/${POSTGRES_DB:-aris}"
    volumes:
      - /opt/aris/docker/superset/superset_config.py:/app/pythonpath/superset_config.py
      - /opt/aris/docker/superset/bootstrap_datasource.py:/app/pythonpath/bootstrap_datasource.py
      - superset_home:/app/superset_home
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname ARIS --lastname Admin --email admin@au-aris.org --password '${SUPERSET_ADMIN_PASSWORD:-Sup3rs3t_Pr0d_2024!qR5tY}' || true &&
        superset init &&
        python /app/pythonpath/bootstrap_datasource.py &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "

  metabase:
    image: metabase/metabase:v0.49.6
    container_name: aris-metabase
    <<: *service-common
    ports:
      - "3035:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: "5432"
      MB_DB_USER: ${POSTGRES_USER:-aris}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-Ar1s_Pr0d_2024!xK9mZ}
      MB_DB_HOST: 10.202.101.185
      MB_EMBEDDING_SECRET_KEY: ${METABASE_EMBEDDING_SECRET:-M3tab4se_Emb3d_Pr0d_2024!uI2oP}
      MB_ENABLE_EMBEDDING: "true"
      MB_EMBEDDING_APP_ORIGIN: "https://au-aris.org"
      MB_SITE_LOCALE: en
      MB_SITE_NAME: "ARIS BI Analytics"
      MB_ANON_TRACKING_ENABLED: "false"
      JAVA_OPTS: "-Dmetabase.embedding.app.origin=https://au-aris.org"
    volumes:
      - metabase_data:/metabase-data

  # ═══════════════════════════════════════════════════
  #  VECTOR TILE SERVER
  # ═══════════════════════════════════════════════════
  pg-tileserv:
    image: pramsey/pg_tileserv:latest
    container_name: aris-pg-tileserv
    <<: *service-common
    ports:
      - "7800:7800"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-Ar1s_Pr0d_2024!xK9mZ}@10.202.101.185:5432/${POSTGRES_DB:-aris}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pg-tileserv.rule=PathPrefix(`/api/v1/geo/tiles`)"
      - "traefik.http.routers.pg-tileserv.entrypoints=web,websecure"

      - "traefik.http.services.pg-tileserv.loadbalancer.server.port=7800"

  # ═══════════════════════════════════════════════════
  #  NEXT.JS FRONTEND
  # ═══════════════════════════════════════════════════
  web:
    container_name: aris-web
    <<: *service-common
    build:
      context: /opt/aris
      dockerfile: Dockerfile.web
      args:
        APP: web
        NEXT_PUBLIC_API_URL: https://au-aris.org
        NEXT_PUBLIC_WS_URL: wss://au-aris.org
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://au-aris.org
      NEXT_PUBLIC_WS_URL: wss://au-aris.org
      # Server-side env vars for BI proxy API routes (Docker service names)
      METABASE_INTERNAL_URL: http://metabase:3000
      GRAFANA_INTERNAL_URL: http://grafana:3000
      SUPERSET_INTERNAL_URL: http://superset:8088
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web,websecure"

      - "traefik.http.routers.web.middlewares=security-headers@file"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  # ═══════════════════════════════════════════════════
  #  PLATFORM TIER (CC-1)
  # ═══════════════════════════════════════════════════
  tenant:
    container_name: aris-tenant
    <<: *service-common
    build:

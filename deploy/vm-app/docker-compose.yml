      - "traefik.http.routers.interop-hub.entrypoints=web,websecure"
      - "traefik.http.services.interop-hub.loadbalancer.server.port=3032"

  # ═══════════════════════════════════════════════════
  #  COLLECTE & WORKFLOW TIER (CC-3)
  # ═══════════════════════════════════════════════════

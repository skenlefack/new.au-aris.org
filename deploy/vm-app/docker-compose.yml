      - "traefik.http.routers.tenant.rule=PathPrefix(`/api/v1/tenants`) || PathPrefix(`/api/v1/settings`) || PathPrefix(`/api/v1/public`)"
      - "traefik.http.routers.tenant.entrypoints=web,websecure"

      - "traefik.http.services.tenant.loadbalancer.server.port=3001"

  credential:

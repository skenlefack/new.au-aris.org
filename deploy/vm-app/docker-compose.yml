      - "traefik.http.routers.message.rule=PathPrefix(`/api/v1/messages`)"
      - "traefik.http.routers.message.entrypoints=web,websecure"
      - "traefik.http.services.message.loadbalancer.server.port=3006"

  drive:
    container_name: aris-drive
    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: drive
        SERVICE_PORT: "3007"
    ports:
      - "3007:3007"
    environment:
      <<: *service-env
      SERVICE_PORT: "3007"
      KAFKA_CLIENT_ID: aris-drive-service
    volumes: *service-volumes
    depends_on:
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drive.rule=PathPrefix(`/api/v1/drive`)"
      - "traefik.http.routers.drive.entrypoints=web,websecure"
      - "traefik.http.services.drive.loadbalancer.server.port=3007"

  realtime:
    container_name: aris-realtime
    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: realtime
        SERVICE_PORT: "3008"
    ports:
      - "3008:3008"
    environment:
      <<: *service-env
      SERVICE_PORT: "3008"
      KAFKA_CLIENT_ID: aris-realtime-service
    volumes: *service-volumes
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.realtime.rule=PathPrefix(`/api/v1/realtime`) || PathPrefix(`/socket.io`)"
      - "traefik.http.routers.realtime.entrypoints=web,websecure"
      - "traefik.http.services.realtime.loadbalancer.server.port=3008"

  # ═══════════════════════════════════════════════════

    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: data-quality
        SERVICE_PORT: "3004"
    ports:
      - "3004:3004"
    environment:
      <<: *service-env
      SERVICE_PORT: "3004"

      - "traefik.enable=true"
      - "traefik.http.routers.form-builder.rule=PathPrefix(`/api/v1/form-builder`)"
      - "traefik.http.routers.form-builder.entrypoints=web,websecure"
      - "traefik.http.services.form-builder.loadbalancer.server.port=3010"

  collecte:
    container_name: aris-collecte
    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: collecte
        SERVICE_PORT: "3011"
    ports:
      - "3011:3011"
    environment:
      <<: *service-env
      SERVICE_PORT: "3011"
      KAFKA_CLIENT_ID: aris-collecte-service
    volumes: *service-volumes
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.collecte.rule=PathPrefix(`/api/v1/collecte`)"
      - "traefik.http.routers.collecte.entrypoints=web,websecure"
      - "traefik.http.services.collecte.loadbalancer.server.port=3011"

  workflow:
    container_name: aris-workflow
    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: workflow
        SERVICE_PORT: "3012"
    ports:
      - "3012:3012"
    environment:
      <<: *service-env
      SERVICE_PORT: "3012"
      KAFKA_CLIENT_ID: aris-workflow-service
    volumes: *service-volumes
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.workflow.rule=PathPrefix(`/api/v1/workflow`)"
      - "traefik.http.routers.workflow.entrypoints=web,websecure"
      - "traefik.http.services.workflow.loadbalancer.server.port=3012"

  # ═══════════════════════════════════════════════════
  #  DOMAIN SERVICES TIER (CC-4)
  # ═══════════════════════════════════════════════════
  animal-health:
    container_name: aris-animal-health
    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: animal-health
        SERVICE_PORT: "3020"
    ports:
      - "3020:3020"
    environment:
      <<: *service-env
      SERVICE_PORT: "3020"
      KAFKA_CLIENT_ID: aris-animal-health-service
    volumes: *service-volumes
    labels:

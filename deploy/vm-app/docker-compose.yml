      - "traefik.http.routers.animal-health.entrypoints=web,websecure"
      - "traefik.http.services.animal-health.loadbalancer.server.port=3020"

  livestock-prod:
    container_name: aris-livestock-prod
    <<: *service-common
    build:
      <<: *service-build
      args:
        SERVICE_NAME: livestock-prod
        SERVICE_PORT: "3021"
    ports:
      - "3021:3021"
    environment:
      <<: *service-env
      SERVICE_PORT: "3021"
      KAFKA_CLIENT_ID: aris-livestock-prod-service

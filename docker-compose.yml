# ARIS 4.0 — Docker Compose Infrastructure
# Kafka KRaft (3 brokers), PostgreSQL+PostGIS, Redis, OpenSearch, MinIO, Mailpit
# Usage: docker compose up -d

version: '3.9'

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.1
  restart: unless-stopped
  networks:
    - aris-network

services:
  # ═══════════════════════════════════════════════════
  # KAFKA KRAFT CLUSTER — 3 Brokers (Controller + Broker)
  # ═══════════════════════════════════════════════════
  kafka-1:
    <<: *kafka-common
    container_name: aris-kafka-1
    hostname: kafka-1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9997
    volumes:
      - kafka-1-data:/var/lib/kafka/data

  kafka-2:
    <<: *kafka-common
    container_name: aris-kafka-2
    hostname: kafka-2
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:29092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_JMX_PORT: 9997
    volumes:
      - kafka-2-data:/var/lib/kafka/data

  kafka-3:
    <<: *kafka-common
    container_name: aris-kafka-3
    hostname: kafka-3
    ports:
      - "9096:9096"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9096'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:29092,EXTERNAL://localhost:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_JMX_PORT: 9997
    volumes:
      - kafka-3-data:/var/lib/kafka/data

  # ═══════════════════════════════════════════════════
  # KAFKA UI — Monitoring & Management
  # ═══════════════════════════════════════════════════
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: aris-kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: 'ARIS Cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka-1:29092,kafka-2:29092,kafka-3:29092'
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # SCHEMA REGISTRY — Avro/JSON Schema governance
  # ═══════════════════════════════════════════════════
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: aris-schema-registry
    hostname: schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka-1:29092,kafka-2:29092,kafka-3:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: 'BACKWARD'
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # POSTGRESQL + POSTGIS — Primary Database
  # ═══════════════════════════════════════════════════
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aris-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aris_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-aris}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aris"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # PGBOUNCER — Connection Pooling Proxy
  # ═══════════════════════════════════════════════════
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: aris-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    volumes:
      - ./infrastructure/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U aris -d aris"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # REDIS — Cache, Sessions, CQRS Read Models, Locks
  # ═══════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: aris-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # OPENSEARCH — Search Engine (Apache 2.0)
  # ═══════════════════════════════════════════════════
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: aris-opensearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-ArisSearch2024!}
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=aris-search
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # OPENSEARCH DASHBOARDS — Visualization (replaces Kibana)
  # ═══════════════════════════════════════════════════
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: aris-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # MINIO — S3-compatible Object Storage
  # ═══════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: aris-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aris_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aris_minio_2024}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # MAILPIT — Email testing (dev only)
  # ═══════════════════════════════════════════════════
  mailpit:
    image: axllent/mailpit:v1.18
    container_name: aris-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # TRAEFIK — API Gateway & Reverse Proxy
  # ═══════════════════════════════════════════════════
  traefik:
    image: traefik:v3.0
    container_name: aris-traefik
    restart: unless-stopped
    ports:
      - "4000:80"      # API Gateway entrypoint
      - "4443:443"     # HTTPS (future TLS termination)
      - "8090:8080"    # Traefik dashboard
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=aris-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--ping=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # PROMETHEUS — Metrics Collection
  # ═══════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: aris-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # GRAFANA — Dashboards & Visualization
  # ═══════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.2
    container_name: aris-grafana
    restart: unless-stopped
    ports:
      - "3200:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-aris_grafana_2024}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Auth Proxy — ARIS backend injects X-WEBAUTH-USER header
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_HEADER_PROPERTY: "email"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Name:X-WEBAUTH-NAME Role:X-WEBAUTH-ROLE"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # JAEGER — Distributed Tracing (OpenTelemetry)
  # ═══════════════════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aris-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
      - "14268:14268"   # Jaeger HTTP thrift receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "badger"
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: "/badger/data"
      BADGER_DIRECTORY_KEY: "/badger/key"
    volumes:
      - jaeger-data:/badger
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:16686/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # BI TOOLS — Apache Superset & Metabase
  # ═══════════════════════════════════════════════════
  superset:
    image: apache/superset:3.1.3
    container_name: aris-superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: aris-superset-secret-key-change-in-production-2024
      TALISMAN_ENABLED: "false"
      ENABLE_CORS: "true"
      SQLALCHEMY_DATABASE_URI: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@postgres:5432/${POSTGRES_DB:-aris}"
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./docker/superset/bootstrap_datasource.py:/app/pythonpath/bootstrap_datasource.py
      - superset_home:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aris-network
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname ARIS --lastname Admin --email admin@au-aris.org --password 'ArisSuperset2024!' || true &&
        superset init &&
        python /app/pythonpath/bootstrap_datasource.py &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "

  metabase:
    image: metabase/metabase:v0.49.6
    container_name: aris-metabase
    restart: unless-stopped
    ports:
      - "3035:3000"
    environment:
      # Metabase internal app database (separate from ARIS data)
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-aris}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-aris_dev_2024}
      MB_DB_HOST: postgres
      MB_EMBEDDING_SECRET_KEY: aris-metabase-embedding-secret-key-2024-change-in-prod
      MB_ENABLE_EMBEDDING: "true"
      MB_EMBEDDING_APP_ORIGIN: "http://localhost:3100"
      MB_SITE_LOCALE: en
      MB_SITE_NAME: "ARIS BI Analytics"
      MB_ANON_TRACKING_ENABLED: "false"
      JAVA_OPTS: "-Dmetabase.embedding.app.origin=http://localhost:3100"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # DOMAIN SERVICES — Wildlife, Apiculture, Trade-SPS, Climate-Env
  # ═══════════════════════════════════════════════════
  wildlife:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: wildlife
        SERVICE_PORT: 3023
    container_name: aris-wildlife
    restart: unless-stopped
    ports:
      - "3023:3023"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@pgbouncer:6432/${POSTGRES_DB:-aris}?pgbouncer=true"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@postgres:5432/${POSTGRES_DB:-aris}"
      KAFKA_BROKERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY:-}"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: "3023"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wildlife.rule=PathPrefix(`/api/v1/wildlife`)"
      - "traefik.http.services.wildlife.loadbalancer.server.port=3023"
    networks:
      - aris-network

  apiculture:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: apiculture
        SERVICE_PORT: 3024
    container_name: aris-apiculture
    restart: unless-stopped
    ports:
      - "3024:3024"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@pgbouncer:6432/${POSTGRES_DB:-aris}?pgbouncer=true"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@postgres:5432/${POSTGRES_DB:-aris}"
      KAFKA_BROKERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY:-}"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: "3024"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apiculture.rule=PathPrefix(`/api/v1/apiculture`)"
      - "traefik.http.services.apiculture.loadbalancer.server.port=3024"
    networks:
      - aris-network

  trade-sps:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: trade-sps
        SERVICE_PORT: 3025
    container_name: aris-trade-sps
    restart: unless-stopped
    ports:
      - "3025:3025"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@pgbouncer:6432/${POSTGRES_DB:-aris}?pgbouncer=true"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@postgres:5432/${POSTGRES_DB:-aris}"
      KAFKA_BROKERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY:-}"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: "3025"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trade-sps.rule=PathPrefix(`/api/v1/trade-sps`)"
      - "traefik.http.services.trade-sps.loadbalancer.server.port=3025"
    networks:
      - aris-network

  climate-env:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: climate-env
        SERVICE_PORT: 3027
    container_name: aris-climate-env
    restart: unless-stopped
    ports:
      - "3027:3027"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@pgbouncer:6432/${POSTGRES_DB:-aris}?pgbouncer=true"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@postgres:5432/${POSTGRES_DB:-aris}"
      KAFKA_BROKERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      JWT_PUBLIC_KEY: "${JWT_PUBLIC_KEY:-}"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: "3027"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.climate-env.rule=PathPrefix(`/api/v1/climate-env`)"
      - "traefik.http.services.climate-env.loadbalancer.server.port=3027"
    networks:
      - aris-network

  # ═══════════════════════════════════════════════════
  # KAFKA TOPIC INIT — Create all topics on startup
  # ═══════════════════════════════════════════════════
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: aris-kafka-init
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka-1:29092 1 60

      echo 'Creating ARIS Kafka topics...'
      BOOTSTRAP=kafka-1:29092

      # === System Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.tenant.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.tenant.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.credential.user.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.credential.user.authenticated.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.message.notification.sent.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.message.notification.failed.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.drive.file.uploaded.v1 --partitions 3 --replication-factor 3

      # === Master Data Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.geo.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.species.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.disease.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.master.denominator.updated.v1 --partitions 3 --replication-factor 3

      # === Quality Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.record.validated.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.record.rejected.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.correction.overdue.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.quality.validation.requested.v1 --partitions 6 --replication-factor 3

      # === Collecte Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.campaign.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.form.submitted.v1 --partitions 12 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.form.synced.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.submission.quality-completed.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.collecte.submission.workflow-created.v1 --partitions 6 --replication-factor 3

      # === FormBuilder Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.formbuilder.template.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.formbuilder.template.published.v1 --partitions 3 --replication-factor 3

      # === Workflow Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.submitted.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.approved.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.rejected.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.validation.escalated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.wahis.ready.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.analytics.ready.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.instance.requested.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.workflow.instance.created.v1 --partitions 6 --replication-factor 3

      # === Health Domain Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.event.created.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.event.updated.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.event.confirmed.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.lab.result.created.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.vaccination.completed.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.surveillance.reported.v1 --partitions 6 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic rec.health.outbreak.alert.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic ms.health.entity.flags-updated.v1 --partitions 3 --replication-factor 3

      # === Interop Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.wahis.exported.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.empres.fed.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.faostat.synced.v1 --partitions 3 --replication-factor 3

      # === Support Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.support.ticket.created.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.support.ticket.updated.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.support.ticket.closed.v1 --partitions 3 --replication-factor 3

      # === Interop V2 Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.dhis2.synced.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.fhir.synced.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic au.interop.oms.synced.v1 --partitions 3 --replication-factor 3

      # === Offline Sync Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.offline.sync.pushed.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.offline.sync.conflict.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic sys.offline.sync.resolved.v1 --partitions 3 --replication-factor 3

      # === DLQ Topics ===
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.all.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.health.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.collecte.v1 --partitions 3 --replication-factor 3
      kafka-topics --create --if-not-exists --bootstrap-server $$BOOTSTRAP --topic dlq.workflow.v1 --partitions 3 --replication-factor 3

      echo 'All ARIS topics created!'
      kafka-topics --list --bootstrap-server $$BOOTSTRAP
      "
    networks:
      - aris-network

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  postgres-data:
  redis-data:
  opensearch-data:
  minio-data:
  prometheus-data:
  grafana-data:
  jaeger-data:
  superset_home:
  metabase_data:

networks:
  aris-network:
    driver: bridge
    name: aris-network

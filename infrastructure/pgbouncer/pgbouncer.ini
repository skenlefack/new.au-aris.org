[databases]
aris = host=aris-postgres port=5432 dbname=aris

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; --- Pool mode ---
pool_mode = transaction

; --- Connection limits ---
max_client_conn = 500
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; --- Timeouts ---
server_lifetime = 3600
server_idle_timeout = 600

; --- Logging ---
log_connections = 1
log_disconnections = 1
stats_period = 60

; --- Prisma compatibility ---
; Prisma sends extra_float_digits and search_path as startup parameters
; which PgBouncer cannot forward in transaction pooling mode
ignore_startup_parameters = extra_float_digits,search_path

; --- Admin ---
admin_users = aris
stats_users = aris

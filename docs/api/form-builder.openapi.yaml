openapi: 3.0.3
info:
  title: ARIS 3.0 — Form Builder Service
  version: 1.0.0
  description: |
    No-Code form template builder for the ARIS data collection framework.
    Manages JSON-Schema-based form templates used by the Collecte service
    for campaign-driven data collection across all 9 ARIS business domains.

servers:
  - url: http://localhost:3010
    description: Development

security:
  - BearerAuth: []

tags:
  - name: Templates
    description: Form template lifecycle (draft → published → archived)

paths:
  /api/v1/form-builder/templates:
    post:
      operationId: createTemplate
      summary: Create a new form template
      description: |
        Creates a draft form template backed by a JSON Schema definition.
        The template is scoped to the caller's tenant hierarchy.
      tags:
        - Templates
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateDto'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Forbidden — caller does not hold one of the required roles:
            SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN, NATIONAL_ADMIN, DATA_STEWARD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listTemplates
      summary: List form templates
      description: |
        Returns a paginated list of form templates visible to the caller's
        tenant. Supports filtering by business domain and template status.
      tags:
        - Templates
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: domain
          in: query
          required: false
          description: Filter by ARIS business domain
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by template status
          schema:
            type: string
            enum: [DRAFT, PUBLISHED, ARCHIVED]
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: createdAt
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated list of templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/form-builder/templates/{id}:
    get:
      operationId: getTemplate
      summary: Get a form template by ID
      description: Returns the full template definition including its JSON Schema.
      tags:
        - Templates
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: updateTemplate
      summary: Update a form template
      description: |
        Partially updates a draft template. Published templates cannot be
        modified — create a new version instead.
      tags:
        - Templates
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateDto'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          description: Validation error or template is not in DRAFT status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Forbidden — caller does not hold one of the required roles:
            SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN, NATIONAL_ADMIN, DATA_STEWARD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/form-builder/templates/{id}/publish:
    post:
      operationId: publishTemplate
      summary: Publish a form template
      description: |
        Transitions the template from DRAFT to PUBLISHED, making it available
        for use in collection campaigns. Publishes a Kafka event on
        `ms.collecte.template.published.v1`.
      tags:
        - Templates
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Template published successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          description: Template is not in DRAFT status or fails validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Forbidden — caller does not hold one of the required roles:
            SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN, NATIONAL_ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/form-builder/templates/{id}/archive:
    post:
      operationId: archiveTemplate
      summary: Archive a form template
      description: |
        Transitions the template to ARCHIVED. Archived templates are no
        longer available for new campaigns but existing submissions
        referencing them remain intact.
      tags:
        - Templates
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Template archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          description: Template is already archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: |
            Forbidden — caller does not hold one of the required roles:
            SUPER_ADMIN, CONTINENTAL_ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/form-builder/templates/{id}/preview:
    get:
      operationId: previewTemplate
      summary: Preview template rendering
      description: |
        Returns a rendered preview of the form template, resolving
        conditional logic, section ordering, and field dependencies
        so that consumers can display the form before publishing.
      tags:
        - Templates
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Rendered template preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatePreviewResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT issued by the ARIS Credential service (port 3002)

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: UUID of the resource
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      required: false
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      required: false
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    CreateTemplateDto:
      type: object
      required:
        - name
        - domain
        - schema
      properties:
        name:
          type: string
          description: Human-readable template name
          example: Outbreak Notification Form
        domain:
          type: string
          description: ARIS business domain this template targets
          example: animal-health
        description:
          type: string
          description: Optional longer description of the template purpose
        schema:
          type: object
          description: JSON Schema definition for the form fields
        metadata:
          type: object
          description: Arbitrary key-value metadata

    UpdateTemplateDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        schema:
          type: object
        metadata:
          type: object

    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        domain:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED, ARCHIVED]
        version:
          type: integer
        schema:
          type: object
        metadata:
          type: object
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TemplateResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Template'

    TemplateListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Template'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TemplatePreviewResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            renderedSections:
              type: array
              items:
                type: object
                description: Resolved sections with fields and conditional logic applied

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Publications schemas ─────────────────────────────────────────────
    CreatePublicationDto:
      type: object
      required:
        - title
        - type
        - language
        - domain
      properties:
        title:
          type: string
          description: Publication title
        description:
          type: string
          description: Publication summary/abstract
        type:
          type: string
          enum:
            - policy_brief
            - report
            - dataset
            - guideline
            - factsheet
          description: Publication type
        domain:
          type: string
          description: Business domain (e.g. health, livestock, fisheries)
        language:
          type: string
          description: Language code (ISO 639-1)
        authors:
          type: array
          items:
            type: string
          description: List of author names
        fileKey:
          type: string
          description: MinIO object key for the uploaded file (via Drive service)
        dataClassification:
          type: string
          enum:
            - PUBLIC
            - PARTNER
            - RESTRICTED
            - CONFIDENTIAL
          default: PUBLIC
          description: Data classification level

    UpdatePublicationDto:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
            - policy_brief
            - report
            - dataset
            - guideline
            - factsheet
        domain:
          type: string
        language:
          type: string
        authors:
          type: array
          items:
            type: string
        fileKey:
          type: string
        dataClassification:
          type: string
          enum:
            - PUBLIC
            - PARTNER
            - RESTRICTED
            - CONFIDENTIAL

    PublicationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            tenantId:
              type: string
              format: uuid
            title:
              type: string
            description:

openapi: 3.0.3
info:
  title: ARIS 3.0 — Knowledge Hub Service
  version: 1.0.0
  description: |
    Knowledge management service for ARIS 3.0.
    Manages publications (policy briefs, reports, datasets), e-learning modules
    (enrollment, progress tracking), and FAQs across all business domains.
    All endpoints require AuthGuard and TenantGuard (JWT with tenantId).

servers:
  - url: http://localhost:3033
    description: Development

security:
  - BearerAuth: []

tags:
  - name: publications
    description: Publication management (policy briefs, reports, datasets)
  - name: elearning
    description: E-learning module management and learner progress
  - name: faq
    description: Frequently asked questions management

paths:
  # ── Controller: api/v1/knowledge/publications ──────────────────────────
  /api/v1/knowledge/publications:
    post:
      operationId: createPublication
      summary: Create publication
      description: |
        Create a new publication entry.
        Requires one of: SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN, NATIONAL_ADMIN.
      tags:
        - publications
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublicationDto"
      responses:
        "201":
          description: Publication created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - insufficient role or tenant permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listPublications
      summary: List publications (filterable by domain, type, language)
      tags:
        - publications
      security:
        - BearerAuth: []
      parameters:
        - name: domain
          in: query
          schema:
            type: string
          description: Business domain filter (e.g. health, livestock, fisheries)
        - name: type
          in: query
          schema:
            type: string
            enum:
              - policy_brief
              - report
              - dataset
              - guideline
              - factsheet
          description: Publication type
        - name: language
          in: query
          schema:
            type: string
          description: Language code (ISO 639-1, e.g. en, fr, ar, pt)
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search in title and description
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt
          description: Sort field
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort order
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        "200":
          description: Paginated list of publications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - insufficient tenant permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/knowledge/publications/{id}:
    get:
      operationId: getPublication
      summary: Get publication
      tags:
        - publications
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Publication ID
      responses:
        "200":
          description: Publication details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - insufficient tenant permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Publication not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updatePublication
      summary: Update publication
      description: |
        Update an existing publication.
        Requires one of: SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN, NATIONAL_ADMIN.
      tags:
        - publications
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Publication ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePublicationDto"
      responses:
        "200":
          description: Publication updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          description: Invalid request body or ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - insufficient role or tenant permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Publication not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/knowledge/publications/{id}/download:
    get:
      operationId: downloadPublication
      summary: Download publication file
      tags:
        - publications
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Publication ID
      responses:
        "200":
          description: Publication file binary stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - insufficient tenant permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Publication or file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Controller: api/v1/knowledge/elearning ─────────────────────────────

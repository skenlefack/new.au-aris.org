        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        "200":
          description: Learner's enrolled courses with progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyCoursesResponse"
        "400":

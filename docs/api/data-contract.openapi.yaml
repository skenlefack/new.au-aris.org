openapi: 3.0.3
info:
  title: ARIS 4.0 — Data Contract Service
  version: 1.0.0
  description: >
    Contract registry for ARIS data exchanges. Each contract defines a schema,
    expected frequency, SLA targets, and owning tenant. Used to enforce the
    "report once, use many" principle and track compliance of data submissions
    against agreed schedules and quality levels.

servers:
  - url: http://localhost:3005
    description: Development

security:
  - BearerAuth: []

tags:
  - name: Data Contracts
    description: Data contract lifecycle and compliance monitoring

paths:
  /api/v1/data-contracts:
    post:
      operationId: createDataContract
      summary: Create a data contract
      tags: [Data Contracts]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN.
        Guards: AuthGuard, TenantGuard.
      responses:
        '201':
          description: Data contract created
        '400':
          description: Validation error
        '401':
          description: Unauthorized — missing or invalid JWT
        '403':
          description: Forbidden — insufficient role
    get:
      operationId: listDataContracts
      summary: List data contracts
      tags: [Data Contracts]
      security:
        - BearerAuth: []
      description: Guards: AuthGuard, TenantGuard.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of data contracts
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/data-contracts/{id}:
    get:
      operationId: getDataContract
      summary: Get a data contract by ID
      tags: [Data Contracts]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Data contract found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Data contract not found
    patch:
      operationId: updateDataContract
      summary: Update a data contract
      tags: [Data Contracts]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Data contract updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Data contract not found

  /api/v1/data-contracts/{id}/compliance:
    get:
      operationId: getDataContractCompliance
      summary: Get compliance status for a data contract
      tags: [Data Contracts]
      security:
        - BearerAuth: []
      description: >
        Returns the compliance status of the specified contract: whether
        submissions meet the agreed frequency, schema conformance rate,
        quality gate pass rate, and SLA adherence.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Compliance status for the contract
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Data contract not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Temporality not found

  # ── Identifiers Controller ──────────────────────────────────────────
  /api/v1/master-data/identifiers:
    post:
      operationId: createIdentifier
      summary: Create an identifier (lab, market, border point, etc.)
      tags: [Identifiers]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN.
        Guards: AuthGuard, TenantGuard.
      responses:
        '201':
          description: Identifier created
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    get:
      operationId: listIdentifiers
      summary: List identifiers
      tags: [Identifiers]
      security:
        - BearerAuth: []
      description: Filterable by type, geoEntityId.
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: geoEntityId
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of identifiers
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/master-data/identifiers/{id}:
    get:
      operationId: getIdentifier
      summary: Get an identifier by ID
      tags: [Identifiers]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Identifier found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Identifier not found
    patch:
      operationId: updateIdentifier
      summary: Update an identifier
      tags: [Identifiers]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Identifier updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':

    get:
      operationId: listDenominators
      summary: List population denominators
      tags: [Denominators]
      security:
        - BearerAuth: []
      description: Filterable by countryCode, speciesId, year.
      parameters:
        - name: countryCode
          in: query
          schema:
            type: string
        - name: speciesId
          in: query
          schema:
            type: string
            format: uuid
        - name: year
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of denominators
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/master-data/denominators/{id}:
    get:
      operationId: getDenominator
      summary: Get a denominator by ID
      tags: [Denominators]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Denominator found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Denominator not found
    patch:
      operationId: updateDenominator
      summary: Update a population denominator
      tags: [Denominators]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Denominator updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Denominator not found

  /api/v1/master-data/denominators/{id}/validate:
    post:
      operationId: validateDenominator
      summary: Validate a population denominator
      tags: [Denominators]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Denominator validated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Denominator not found

  # ── Version Controller ──────────────────────────────────────────────
  /api/v1/master-data/version:
    get:
      operationId: getMasterDataVersion
      summary: Get master data version information
      tags: [Version]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Version metadata
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

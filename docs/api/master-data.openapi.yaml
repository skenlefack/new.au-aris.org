  # ── Denominators Controller ─────────────────────────────────────────
  /api/v1/master-data/denominators:
    post:
      operationId: createDenominator
      summary: Create a population denominator
      tags: [Denominators]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD.
        Guards: AuthGuard, TenantGuard.
      responses:
        '201':
          description: Denominator created
        '400':
          description: Validation error
        '401':
          description: Unauthorized

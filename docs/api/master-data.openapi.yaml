  /api/v1/master-data/units:
    post:
      operationId: createUnit
      summary: Create a measurement unit
      tags: [Units]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN.
        Guards: AuthGuard, TenantGuard.
      responses:
        '201':
          description: Unit created
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':

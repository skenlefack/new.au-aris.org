openapi: 3.0.3
info:
  title: ARIS 3.0 — Animal Health & One Health Service
  version: 1.0.0
  description: |
    Manages animal health events (outbreaks, surveillance signals), laboratory results,
    surveillance activities, vaccination campaigns, and veterinary service capacities
    across AU-IBAR Member States. Aligned with WOAH/WAHIS reporting and One Health principles.

servers:
  - url: http://localhost:3020
    description: Development

security:
  - BearerAuth: []

tags:
  - name: HealthEvents
    description: Disease events — outbreaks, rumours, signals
  - name: LabResults
    description: Laboratory sample results linked to health events
  - name: Surveillance
    description: Surveillance activities — active and passive
  - name: Vaccinations
    description: Vaccination campaigns and coverage tracking
  - name: Capacities
    description: Veterinary service (SV) capacity data and PVS metrics

paths:
  # ──────────────────────────────────────────────────────────────
  # Health Events Controller
  # ──────────────────────────────────────────────────────────────
  /api/v1/animal-health/events:
    post:
      operationId: createHealthEvent
      summary: Create a new health event (outbreak, rumour, signal)
      tags: [HealthEvents]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN, DATA_STEWARD, FIELD_AGENT.
        Guards: AuthGuard, TenantGuard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHealthEventDto'
      responses:
        '201':
          description: Health event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEventResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient role or tenant access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listHealthEvents
      summary: List health events with filters
      tags: [HealthEvents]
      security:
        - BearerAuth: []
      description: |
        Filterable by diseaseId, eventType, status, geoEntityId, dateRange.
        Guards: AuthGuard, TenantGuard.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
        - name: diseaseId
          in: query
          schema:
            type: string
            format: uuid
        - name: eventType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: geoEntityId
          in: query
          schema:
            type: string
            format: uuid
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated list of health events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEventListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/animal-health/events/{id}:
    get:
      operationId: getHealthEvent
      summary: Get a single health event by ID
      tags: [HealthEvents]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Health event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEventResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Health event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: updateHealthEvent
      summary: Update a health event
      tags: [HealthEvents]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN, DATA_STEWARD.
        Guards: AuthGuard, TenantGuard.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHealthEventDto'
      responses:
        '200':
          description: Health event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEventResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Health event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/animal-health/events/{id}/confirm:
    post:
      operationId: confirmHealthEvent
      summary: Confirm a health event (set dateConfirmation and confidenceLevel)
      tags: [HealthEvents]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN, DATA_STEWARD.
        Guards: AuthGuard, TenantGuard.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmHealthEventDto'
      responses:
        '200':
          description: Health event confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEventResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Health event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # Lab Results Controller
  # ──────────────────────────────────────────────────────────────
  /api/v1/animal-health/lab-results:
    post:
      operationId: createLabResult
      summary: Create a laboratory result linked to a health event
      tags: [LabResults]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, NATIONAL_ADMIN, DATA_STEWARD, FIELD_AGENT.
        Guards: AuthGuard, TenantGuard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabResultDto'
      responses:
        '201':
          description: Lab result created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabResultResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listLabResults
      summary: List laboratory results
      tags: [LabResults]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: Paginated list of lab results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabResultListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/animal-health/lab-results/{id}:
    get:
      operationId: getLabResult
      summary: Get a single lab result by ID
      tags: [LabResults]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Lab result details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabResultResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Lab result not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # Surveillance Controller
  # ──────────────────────────────────────────────────────────────
  /api/v1/animal-health/surveillance:
    post:
      operationId: createSurveillanceActivity
      summary: Create a surveillance activity (active or passive)
      tags: [Surveillance]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, NATIONAL_ADMIN, DATA_STEWARD, FIELD_AGENT.
        Guards: AuthGuard, TenantGuard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSurveillanceDto'
      responses:
        '201':
          description: Surveillance activity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveillanceResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listSurveillanceActivities
      summary: List surveillance activities
      tags: [Surveillance]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: Paginated list of surveillance activities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveillanceListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # Vaccinations Controller
  # ──────────────────────────────────────────────────────────────
  /api/v1/animal-health/vaccinations:
    post:
      operationId: createVaccinationCampaign
      summary: Create a vaccination campaign
      tags: [Vaccinations]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, NATIONAL_ADMIN, DATA_STEWARD, FIELD_AGENT.
        Guards: AuthGuard, TenantGuard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVaccinationDto'
      responses:
        '201':
          description: Vaccination campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccinationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listVaccinationCampaigns
      summary: List vaccination campaigns
      tags: [Vaccinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: Paginated list of vaccination campaigns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccinationListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/animal-health/vaccinations/{id}/coverage:
    get:
      operationId: getVaccinationCoverage
      summary: Get vaccination coverage statistics for a campaign
      tags: [Vaccinations]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Coverage statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccinationCoverageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Vaccination campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # Capacities Controller
  # ──────────────────────────────────────────────────────────────
  /api/v1/animal-health/capacities:
    post:
      operationId: submitCapacityData
      summary: Submit veterinary service (SV) capacity data
      tags: [Capacities]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, NATIONAL_ADMIN, DATA_STEWARD.
        Guards: AuthGuard, TenantGuard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCapacityDto'
      responses:
        '201':
          description: Capacity record submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listCapacityRecords
      summary: List veterinary service capacity records
      tags: [Capacities]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: Paginated list of capacity records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacityListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 signed JWT issued by the ARIS Credential service

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page

    SortParam:
      name: sort
      in: query
      schema:
        type: string
        default: createdAt
      description: Field to sort by

    OrderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order

  schemas:
    # ── Shared ──────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [total, page, limit]

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
      required: [field, message]

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
      required: [statusCode, message]

    # ── Health Events ───────────────────────────────────────────
    CreateHealthEventDto:
      type: object
      properties:
        diseaseId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [OUTBREAK, RUMOUR, SIGNAL]
        geoEntityId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        dateSuspicion:
          type: string
          format: date
        description:
          type: string
        dataClassification:
          type: string
          enum: [PUBLIC, PARTNER, RESTRICTED, CONFIDENTIAL]
      required: [diseaseId, eventType, geoEntityId, speciesId, dateSuspicion]

    UpdateHealthEventDto:
      type: object
      properties:
        status:
          type: string
        description:
          type: string
        geoEntityId:
          type: string
          format: uuid

    ConfirmHealthEventDto:
      type: object
      properties:
        dateConfirmation:
          type: string
          format: date
        confidenceLevel:
          type: string
          enum: [RUMOUR, VERIFIED, CONFIRMED]
        confirmedBy:
          type: string
      required: [dateConfirmation, confidenceLevel]

    HealthEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        diseaseId:
          type: string
          format: uuid
        eventType:
          type: string
        status:
          type: string
        geoEntityId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        dateSuspicion:
          type: string
          format: date
        dateConfirmation:
          type: string
          format: date
          nullable: true
        confidenceLevel:
          type: string
          nullable: true
        description:
          type: string
        dataClassification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HealthEventResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/HealthEvent'

    HealthEventListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/HealthEvent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Lab Results ─────────────────────────────────────────────
    CreateLabResultDto:
      type: object
      properties:
        healthEventId:
          type: string
          format: uuid
        labId:
          type: string
          format: uuid
        sampleDate:
          type: string
          format: date
        testType:
          type: string
        result:
          type: string
          enum: [POSITIVE, NEGATIVE, INCONCLUSIVE]
        dataClassification:
          type: string
          enum: [PUBLIC, PARTNER, RESTRICTED, CONFIDENTIAL]
      required: [healthEventId, labId, sampleDate, testType, result]

    LabResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        healthEventId:
          type: string
          format: uuid
        labId:
          type: string
          format: uuid
        sampleDate:
          type: string
          format: date
        testType:
          type: string
        result:
          type: string
        dataClassification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LabResultResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/LabResult'

    LabResultListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LabResult'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Surveillance ────────────────────────────────────────────
    CreateSurveillanceDto:
      type: object
      properties:
        activityType:
          type: string
          enum: [ACTIVE, PASSIVE, SENTINEL]
        diseaseId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        description:
          type: string
        dataClassification:
          type: string
          enum: [PUBLIC, PARTNER, RESTRICTED, CONFIDENTIAL]
      required: [activityType, diseaseId, geoEntityId, startDate]

    Surveillance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        activityType:
          type: string
        diseaseId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
        dataClassification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SurveillanceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Surveillance'

    SurveillanceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Surveillance'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Vaccinations ────────────────────────────────────────────
    CreateVaccinationDto:
      type: object
      properties:
        diseaseId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        campaignName:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        targetPopulation:
          type: integer
        dosesAdministered:
          type: integer
        dataClassification:
          type: string

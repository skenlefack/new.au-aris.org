openapi: 3.0.3
info:
  title: ARIS 3.0 — Credential Service
  version: 1.0.0
  description: >
    Authentication and user management for the ARIS platform.
    Provides JWT RS256 token issuance, refresh, RBAC role assignment,
    MFA enrolment, and user profile management. Passwords are hashed
    with bcrypt; tokens carry tenantId, role, and dataClassification claims.

servers:
  - url: http://localhost:3002
    description: Development

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication — register, login, refresh, logout
  - name: Users
    description: User management — list, profile, update

paths:
  # ── Auth Controller ────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      operationId: registerUser
      summary: Register a new user
      description: >
        Creates a new user account with the specified role and tenant.
        Only administrators (SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN,
        NATIONAL_ADMIN) may register users, and only for tenants within
        their own hierarchy scope.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error (duplicate email, weak password, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >
            Insufficient role — requires SUPER_ADMIN, CONTINENTAL_ADMIN,
            REC_ADMIN, or NATIONAL_ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      operationId: loginUser
      summary: Authenticate and obtain tokens
      description: >
        Validates email + password (bcrypt) and returns an RS256-signed
        access token and a refresh token. Rate-limited per IP.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: >
        Exchanges a valid refresh token for a new access/refresh token pair.
        The old refresh token is invalidated (rotation).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshDto'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      operationId: logoutUser
      summary: Logout and revoke tokens
      description: >
        Revokes the caller's refresh token and blacklists the current
        access token for its remaining TTL (stored in Redis).
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Users Controller ───────────────────────────────────────────────
  /api/v1/users:
    get:
      operationId: listUsers
      summary: List users
      description: >
        Returns a paginated list of users visible to the caller,
        scoped by tenantId and hierarchy level. Guards: AuthGuard, TenantGuard.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UserRole'
          description: Filter by user role
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by specific tenant (must be within caller's hierarchy)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            default: createdAt
          description: Field to sort by
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      description: >
        Returns the profile of the authenticated user based on the JWT claims.
        Guards: AuthGuard, TenantGuard.
      tags:
        - Users
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{id}:
    patch:
      operationId: updateUser
      summary: Update user
      description: >
        Partially updates a user's profile, role, or status. Only administrators
        (SUPER_ADMIN, CONTINENTAL_ADMIN, REC_ADMIN, NATIONAL_ADMIN) may update
        users, and only within their own hierarchy scope.
        Guards: AuthGuard, TenantGuard.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: >
            Insufficient role — requires SUPER_ADMIN, CONTINENTAL_ADMIN,
            REC_ADMIN, or NATIONAL_ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT issued by the Credential service

  parameters:
    UserIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID

    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-based)

    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page

  schemas:
    UserRole:
      type: string
      enum:
        - SUPER_ADMIN
        - CONTINENTAL_ADMIN
        - REC_ADMIN
        - NATIONAL_ADMIN
        - DATA_STEWARD
        - WAHIS_FOCAL_POINT
        - ANALYST
        - FIELD_AGENT

    RegisterDto:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - role
        - tenantId
      properties:
        email:
          type: string
          format: email
          example: jdoe@ibar.africa
        password:
          type: string
          format: password
          minLength: 12
          description: Minimum 12 characters, at least one upper, lower, digit, and special character
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        role:
          $ref: '#/components/schemas/UserRole'
        tenantId:
          type: string
          format: uuid
          description: Tenant the new user belongs to

    LoginDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshDto:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Opaque refresh token received during login or previous refresh

    UpdateUserDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        tenantId:
          type: string
          format: uuid
        isActive:
          type: boolean
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TokenResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accessToken:
              type: string
              description: RS256-signed JWT (short-lived)
            refreshToken:
              type: string
              description: Opaque refresh token (long-lived, rotated on use)
            expiresIn:
              type: integer
              description: Access token TTL in seconds
              example: 900

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    UserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

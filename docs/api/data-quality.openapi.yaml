openapi: 3.0.3
info:
  title: ARIS 3.0 — Data Quality Service
  version: 1.0.0
  description: >
    Quality gates, confidence scoring, and correction loop for ARIS data records.
    Enforces 8 mandatory quality checks: completeness, temporal consistency,
    geographic consistency, codes & vocabularies, units, deduplication,
    auditability, and confidence scoring. Supports custom rules per domain
    and a correction workflow for rejected records.

servers:
  - url: http://localhost:3004
    description: Development

security:
  - BearerAuth: []

tags:
  - name: Validation
    description: Validate records against quality gates
  - name: Reports
    description: Quality validation reports
  - name: Dashboard
    description: Aggregated quality metrics
  - name: Rules
    description: Quality rule definitions (built-in and custom)
  - name: Corrections
    description: Correction workflow for rejected records

paths:
  # ── Validation Controller ───────────────────────────────────────────
  /api/v1/data-quality/validate:
    post:
      operationId: validateRecord
      summary: Validate a record against quality gates
      tags: [Validation]
      security:
        - BearerAuth: []
      description: >
        Runs all applicable quality gates on the submitted record and
        returns a quality report with pass/fail per rule, confidence score,
        and any correction suggestions. Guards: AuthGuard, TenantGuard.
      responses:
        '200':
          description: Validation result with quality report
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized — missing or invalid JWT
        '403':
          description: Forbidden — insufficient role or tenant mismatch

  # ── Reports Controller ──────────────────────────────────────────────
  /api/v1/data-quality/reports:
    get:
      operationId: listQualityReports
      summary: List quality validation reports
      tags: [Reports]
      security:
        - BearerAuth: []
      description: Guards: AuthGuard, TenantGuard.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of quality reports
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/data-quality/reports/{id}:
    get:
      operationId: getQualityReport
      summary: Get a quality report by ID
      tags: [Reports]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quality report found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Quality report not found

  # ── Dashboard Controller ────────────────────────────────────────────
  /api/v1/data-quality/dashboard:
    get:
      operationId: getQualityDashboard
      summary: Get quality dashboard statistics
      tags: [Dashboard]
      security:
        - BearerAuth: []
      description: >
        Returns aggregated quality metrics for the current tenant scope:
        pass/fail rates, most-violated rules, trend data, correction
        backlog size. Guards: AuthGuard, TenantGuard.
      responses:
        '200':
          description: Dashboard statistics
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # ── Rules Controller ────────────────────────────────────────────────
  /api/v1/data-quality/rules:
    post:
      operationId: createQualityRule
      summary: Create a custom quality rule
      tags: [Rules]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD.
        Guards: AuthGuard, TenantGuard.
      responses:
        '201':
          description: Quality rule created
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    get:
      operationId: listQualityRules
      summary: List quality rules
      tags: [Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of quality rules
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/data-quality/rules/{id}:
    get:
      operationId: getQualityRule
      summary: Get a quality rule by ID
      tags: [Rules]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quality rule found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Quality rule not found
    patch:
      operationId: updateQualityRule
      summary: Update a quality rule
      tags: [Rules]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quality rule updated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Quality rule not found

  # ── Corrections Controller ──────────────────────────────────────────
  /api/v1/data-quality/corrections:
    get:
      operationId: listCorrections
      summary: List corrections
      tags: [Corrections]
      security:
        - BearerAuth: []
      description: Guards: AuthGuard, TenantGuard.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of corrections
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/data-quality/corrections/{reportId}:
    get:
      operationId: getCorrectionByReportId
      summary: Get correction details by quality report ID
      tags: [Corrections]
      security:
        - BearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Correction found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Correction not found for given report

  /api/v1/data-quality/corrections/{reportId}/corrected:
    patch:
      operationId: markCorrectionCorrected
      summary: Mark a correction as corrected
      tags: [Corrections]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD.
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Correction marked as corrected
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Correction not found

  /api/v1/data-quality/corrections/{reportId}/assign:
    patch:
      operationId: assignCorrection
      summary: Assign a correction to a user
      tags: [Corrections]
      security:
        - BearerAuth: []
      description: >
        Requires roles: SUPER_ADMIN, CONTINENTAL_ADMIN, DATA_STEWARD, NATIONAL_ADMIN.
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Correction assigned
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Correction not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

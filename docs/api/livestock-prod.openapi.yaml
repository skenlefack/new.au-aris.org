openapi: 3.0.3
info:
  title: ARIS 3.0 — Livestock Production & Pastoralism Service
  version: 1.0.0
  description: |
    Manages livestock census data, production records, slaughter statistics,
    and transhumance corridor tracking across AU-IBAR Member States.
    Supports FAOSTAT-anchored denominators and national census reconciliation.

servers:
  - url: http://localhost:3021
    description: Development

security:
  - BearerAuth: []

tags:
  - name: Census
    description: Livestock census records — population counts by species, area, year
  - name: Production
    description: Livestock production records — milk, eggs, meat, hides
  - name: Slaughter
    description: Slaughter records — abattoir and informal slaughter data
  - name: Transhumance
    description: Transhumance corridors — seasonal movement routes and cross-border patterns

paths:
  # ──────────────────────────────────────────────────────────────
  # Census Controller
  # ──────────────────────────────────────────────────────────────
  /api/v1/livestock/census:
    post:
      operationId: createCensusRecord
      summary: Create a livestock census record
      tags: [Census]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN, DATA_STEWARD, FIELD_AGENT.
        Guards: AuthGuard, TenantGuard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCensusDto'
      responses:
        '201':
          description: Census record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CensusResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — insufficient role or tenant access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listCensusRecords
      summary: List livestock census records
      tags: [Census]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: Paginated list of census records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CensusListResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/livestock/census/{id}:
    get:
      operationId: getCensusRecord
      summary: Get a single census record by ID
      tags: [Census]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Census record details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CensusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Census record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: updateCensusRecord
      summary: Update a census record
      tags: [Census]
      security:
        - BearerAuth: []
      description: |
        Roles: SUPER_ADMIN, CONTINENTAL_ADMIN, NATIONAL_ADMIN, DATA_STEWARD.
        Guards: AuthGuard, TenantGuard.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCensusDto'
      responses:
        '200':
          description: Census record updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CensusResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Census record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 signed JWT issued by the ARIS Credential service

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page

    SortParam:
      name: sort
      in: query
      schema:
        type: string
        default: createdAt
      description: Field to sort by

    OrderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort order

  schemas:
    # ── Shared ──────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [total, page, limit]

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
      required: [field, message]

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
      required: [statusCode, message]

    # ── Census ──────────────────────────────────────────────────
    CreateCensusDto:
      type: object
      properties:
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        reportingYear:
          type: integer
        population:
          type: integer
        source:
          type: string
          enum: [NATIONAL_CENSUS, FAOSTAT, ESTIMATE]
        methodology:
          type: string
        dataClassification:
          type: string
          enum: [PUBLIC, PARTNER, RESTRICTED, CONFIDENTIAL]
      required: [speciesId, geoEntityId, reportingYear, population, source]

    UpdateCensusDto:
      type: object
      properties:
        population:
          type: integer
        source:
          type: string
          enum: [NATIONAL_CENSUS, FAOSTAT, ESTIMATE]
        methodology:
          type: string

    Census:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        reportingYear:
          type: integer
        population:
          type: integer
        source:
          type: string
        methodology:
          type: string
          nullable: true
        dataClassification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CensusResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Census'

    CensusListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Census'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Production ──────────────────────────────────────────────
    CreateProductionDto:
      type: object
      properties:
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        reportingYear:
          type: integer
        productType:
          type: string
          enum: [MILK, EGGS, MEAT, HIDES, WOOL, OTHER]
        quantity:
          type: number
          format: float
        unit:
          type: string
        dataClassification:
          type: string
          enum: [PUBLIC, PARTNER, RESTRICTED, CONFIDENTIAL]
      required: [speciesId, geoEntityId, reportingYear, productType, quantity, unit]

    UpdateProductionDto:
      type: object
      properties:
        quantity:
          type: number
          format: float
        unit:
          type: string
        productType:
          type: string
          enum: [MILK, EGGS, MEAT, HIDES, WOOL, OTHER]

    Production:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        reportingYear:
          type: integer
        productType:
          type: string
        quantity:
          type: number
          format: float
        unit:
          type: string
        dataClassification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductionResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Production'

    ProductionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Production'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # ── Slaughter ───────────────────────────────────────────────
    CreateSlaughterDto:
      type: object
      properties:
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        facilityId:
          type: string
          format: uuid
        reportingDate:
          type: string
          format: date
        headCount:
          type: integer
        carcassWeightKg:
          type: number
          format: float
        inspectionStatus:
          type: string
          enum: [PASSED, CONDEMNED, PARTIAL_CONDEMNATION]
        dataClassification:
          type: string
          enum: [PUBLIC, PARTNER, RESTRICTED, CONFIDENTIAL]
      required: [speciesId, geoEntityId, reportingDate, headCount]

    UpdateSlaughterDto:
      type: object
      properties:
        headCount:
          type: integer
        carcassWeightKg:
          type: number
          format: float
        inspectionStatus:
          type: string
          enum: [PASSED, CONDEMNED, PARTIAL_CONDEMNATION]

    Slaughter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        geoEntityId:
          type: string
          format: uuid
        facilityId:
          type: string
          format: uuid
          nullable: true
        reportingDate:
          type: string
          format: date
        headCount:
          type: integer
        carcassWeightKg:
          type: number
          format: float
          nullable: true
        inspectionStatus:
          type: string
          nullable: true
        dataClassification:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SlaughterResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Slaughter'

    SlaughterListResponse:
      type: object
      properties:
        data:
          type: array
          items:

# ARIS 3.0 — Release Pipeline
# Triggered on version tag push (v*)

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aris

jobs:
  # ─────────────────────────────────────────────
  # Build & Push Docker Images with version tag
  # ─────────────────────────────────────────────
  release-docker:
    name: Release — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - tenant
          - credential
          - message
          - drive
          - realtime
          - master-data
          - data-quality
          - data-contract
          - interop-hub
          - form-builder
          - collecte
          - workflow
          - animal-health
          - livestock-prod
          - fisheries
          - wildlife
          - apiculture
          - trade-sps
          - governance
          - climate-env
          - analytics
          - geo-services
          - knowledge-hub
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Build Web Apps for release
  # ─────────────────────────────────────────────
  release-web:
    name: Release — Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web apps
        run: pnpm turbo build --filter=@aris/web --filter=@aris/admin

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-web-${{ github.ref_name }}
          path: |
            apps/web/.next/
            apps/admin/.next/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [release-docker, release-web]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## ARIS 3.0 — ${{ github.ref_name }}

            ### Docker Images
            All service images tagged `${{ github.ref_name }}` are available at `ghcr.io/${{ github.repository_owner }}/aris/<service>`.

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

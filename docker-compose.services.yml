    environment:
      <<: *service-env
      SERVICE_PORT: "3002"
      KAFKA_CLIENT_ID: aris-credential-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.credential.rule=PathPrefix(`/api/v1/credential`) || PathPrefix(`/api/v1/auth`) || PathPrefix(`/api/v1/users`)"
      - "traefik.http.services.credential.loadbalancer.server.port=3002"

  message:

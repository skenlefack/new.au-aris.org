# ARIS 3.0 — Microservices Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.services.yml up -d
#
# All 22 NestJS microservices grouped by tier.
# Requires infrastructure from docker-compose.yml (postgres, redis, kafka, etc.)

x-service-common: &service-common
  build:
    context: .
    dockerfile: Dockerfile.service
  restart: unless-stopped
  networks:
    - aris-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka-1:
      condition: service_started
    kafka-2:
      condition: service_started
    kafka-3:
      condition: service_started

x-service-env: &service-env
  NODE_ENV: development
  DATABASE_URL: postgresql://${POSTGRES_USER:-aris}:${POSTGRES_PASSWORD:-aris_dev_2024}@postgres:5432/${POSTGRES_DB:-aris}
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
  KAFKA_CLIENT_ID: aris-services
  ELASTICSEARCH_URL: http://elasticsearch:9200
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aris_minio}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aris_minio_2024}
  MINIO_BUCKET: aris-documents
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_FROM: noreply@aris.africa
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}

services:

  # ═══════════════════════════════════════════════════
  #  PLATFORM TIER (CC-1)
  # ═══════════════════════════════════════════════════

  tenant:
    <<: *service-common
    container_name: aris-tenant
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: tenant
        SERVICE_PORT: "3001"
    ports:
      - "3001:3001"
    environment:
      <<: *service-env
      SERVICE_PORT: "3001"
      KAFKA_CLIENT_ID: aris-tenant-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tenant.rule=PathPrefix(`/api/v1/tenants`)"
      - "traefik.http.services.tenant.loadbalancer.server.port=3001"

  credential:
    <<: *service-common
    container_name: aris-credential
    build:
      context: .
      dockerfile: Dockerfile.service
      args:

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    editable: false
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true

  - name: ARIS-PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    isDefault: false
    editable: false
    jsonData:
      database: aris
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      user: ${POSTGRES_USER:-aris}
      password: ${POSTGRES_PASSWORD:-aris_dev_2024}
